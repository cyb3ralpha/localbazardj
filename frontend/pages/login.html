<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — Local Bazar</title>
<link rel="stylesheet" href="../assets/css/global.css">
<style>
body{background:var(--surface);display:flex;flex-direction:column;min-height:100vh;}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
.auth-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:440px;overflow:hidden;}
.auth-header{background:linear-gradient(135deg,#0F1117,#1E2230);padding:40px 40px 32px;text-align:center;}
.auth-logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--saffron);margin-bottom:4px;}
.auth-header p{color:rgba(255,255,255,.5);font-size:.875rem;}
.auth-body{padding:36px 40px;}
.auth-footer{text-align:center;padding:0 40px 32px;font-size:.875rem;color:var(--muted);}
.auth-footer a{color:var(--saffron);font-weight:600;}
.divider{text-align:center;color:var(--muted);font-size:.8rem;margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}
.role-tabs{display:flex;background:var(--surface);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px;gap:4px;}
.role-tab{flex:1;padding:8px;border-radius:6px;font-size:.8rem;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);transition:var(--trans);}
.role-tab.active{background:var(--white);color:var(--saffron);box-shadow:var(--shadow);}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="../index.html" class="navbar-logo">🛒 Local<span>Bazar</span></a></div></nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🛒 LocalBazar</div>
      <p>Sign in to your account</p>
    </div>
    <div class="auth-body">
      <div id="error-msg" style="display:none;background:#FEE2E2;color:#991B1B;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:.875rem;"></div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;border-radius:var(--radius-sm);" id="login-btn" onclick="login()">Sign In</button>
      <div class="divider">or</div>
      <div style="background:var(--surface);border-radius:var(--radius-sm);padding:14px;font-size:.8rem;color:var(--muted);">
        <strong style="color:var(--slate);display:block;margin-bottom:8px;">Demo Accounts:</strong>
        <div style="display:grid;gap:4px;">
          <span>👑 Admin: <code>admin</code> / <code>admin123</code></span>
          <span>🏪 Seller: <code>seller1</code> / <code>seller123</code></span>
          <span>👷 Employee: <code>employee1</code> / <code>emp123</code></span>
        </div>
      </div>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script>
if(Auth.isLoggedIn()){
  const user=Auth.getUser();
  if(['admin','employee'].includes(user.role)) window.location.href='admin-dashboard.html';
  else if(user.role==='seller') window.location.href='seller-dashboard.html';
  else window.location.href='../index.html';
}

async function login(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  if(!username||!password){showErr('Please fill all fields');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Signing in…';
  const r=await apiCall('/auth/login/','POST',{username,password});
  btn.disabled=false; btn.textContent='Sign In';
  if(!r||!r.ok){showErr(r?.data?.detail||'Invalid credentials');return;}
  // Fetch profile
  const tmp_token=r.data.access;
  const headers={'Authorization':`Bearer ${tmp_token}`,'Content-Type':'application/json'};
  const prof=await fetch(CONFIG.API_BASE+'/auth/profile/',{headers}).then(x=>x.json()).catch(()=>null);
  Auth.setAuth(r.data.access,r.data.refresh,prof||{username,role:'customer'});
  const user=prof||{role:'customer'};
  if(['admin','employee'].includes(user.role)) window.location.href='admin-dashboard.html';
  else if(user.role==='seller') window.location.href='seller-dashboard.html';
  else window.location.href='../index.html';
}

function showErr(msg){const e=document.getElementById('error-msg');e.textContent=msg;e.style.display='block';}
</script>
</body>
</html>
